name: Publish Packages

on: pull_request

jobs:
  publish:
    env:
      NPM_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v3
          with:
            node-version: 18
        - run: corepack enable
        - run: yarn run setup
        - run: yarn run prep
        - run: yarn run publish
